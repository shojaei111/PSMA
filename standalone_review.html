<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSMA-PET/CT Reviewer Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
        
        :root {
            --bg-color: #060913;
            --header-bg: #0d1527;
            --text-main: #e2e8f0;
            --border-color: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --tab-active: #1e293b;
            --tab-inactive: #0f172a;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        header {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 0;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding-left: 20px;
            padding-top: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }
        
        .header-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
            margin-right: 30px;
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .tab-btn {
            background-color: var(--tab-inactive);
            color: #94a3b8;
            border: 1px solid var(--border-color);
            border-bottom: none;
            padding: 10px 20px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            transition: all 0.2s;
            position: relative;
            top: 1px;
        }
        
        .tab-btn:hover {
            background-color: #162032;
            color: #cbd5e1;
        }
        
        .tab-btn.active {
            background-color: var(--bg-color);
            color: var(--accent-hover);
            border-bottom: 1px solid var(--bg-color);
            z-index: 2;
        }
        
        .iframe-container {
            flex: 1;
            position: relative;
            background-color: var(--bg-color);
        }
        
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        iframe.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 5;
        }
    </style>
</head>

    <script>
        function switchTab(tabId) {
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Update iframes
            document.querySelectorAll('iframe').forEach(frame => frame.classList.remove('active'));
            document.getElementById('frame-' + tabId).classList.add('active');
        }
        
        // Listen for messages from child iframes (cross-iframe communication)
        window.addEventListener('message', function(event) {
            const btns = document.querySelectorAll('.tab-btn');
            if (event.data === 'open_explorer') {
                btns[1].click(); // Click Variables Explorer tab
            } else if (event.data === 'open_primary') {
                btns[2].click(); // Click Prostate Primary tab
            } else if (event.data === 'open_tnm') {
                btns[3].click(); // Click Prostate TNM tab
            }
        });
    </script>
